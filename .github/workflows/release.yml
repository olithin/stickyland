name: Release

# Builds installers and attaches them to a GitHub Release when you push a version tag.
# Example:
#   git tag v1.0.1
#   git push origin v1.0.1

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: macOS DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # jpackage from JDK 25 is flaky on macOS CI; use 21 for packaging.
      # Last setup-java wins JAVA_HOME → Gradle/jpackage use 21.
      # Kotlin jvmToolchain(25) still compiles with 25 via foojay.
      - name: Set up JDK 25 for Kotlin toolchain
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up JDK 21 for jpackage
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Clear local Windows JDK path
        run: |
          if [ -f gradle.properties ]; then
            sed -i.bak 's/^org.gradle.java.home=/# org.gradle.java.home=/' gradle.properties || true
          fi

      - name: Build macOS ICNS from PNG
        run: |
          mkdir -p icon.iconset
          sips -z 16 16     src/main/resources/icon.png --out icon.iconset/icon_16x16.png
          sips -z 32 32     src/main/resources/icon.png --out icon.iconset/icon_16x16@2x.png
          sips -z 32 32     src/main/resources/icon.png --out icon.iconset/icon_32x32.png
          sips -z 64 64     src/main/resources/icon.png --out icon.iconset/icon_32x32@2x.png
          sips -z 128 128   src/main/resources/icon.png --out icon.iconset/icon_128x128.png
          sips -z 256 256   src/main/resources/icon.png --out icon.iconset/icon_128x128@2x.png
          sips -z 256 256   src/main/resources/icon.png --out icon.iconset/icon_256x256.png
          sips -z 512 512   src/main/resources/icon.png --out icon.iconset/icon_256x256@2x.png
          sips -z 512 512   src/main/resources/icon.png --out icon.iconset/icon_512x512.png
          sips -z 1024 1024 src/main/resources/icon.png --out icon.iconset/icon_512x512@2x.png
          iconutil -c icns icon.iconset -o src/main/resources/icon.icns
          ls -la src/main/resources/icon.icns

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build DMG
        run: |
          chmod +x gradlew
          java -version
          echo "JAVA_HOME=$JAVA_HOME"
          ./gradlew packageDmg --no-daemon --stacktrace

      - name: Show jpackage logs on failure
        if: failure()
        run: |
          echo "=== jpackage error logs ==="
          find build/compose/logs -type f -print -exec cat {} \; || true

      - name: Upload DMG artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: stickyland-macos-dmg
          path: build/compose/binaries/main/dmg/*.dmg
          if-no-files-found: error

  build-windows:
    name: Windows MSI / EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Clear local Windows JDK path
        shell: bash
        run: |
          if [ -f gradle.properties ]; then
            sed -i.bak 's/^org.gradle.java.home=/# org.gradle.java.home=/' gradle.properties || true
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Windows packages
        run: .\gradlew.bat packageMsi packageExe --no-daemon --stacktrace

      - name: Upload Windows artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: stickyland-windows
          path: |
            build/compose/binaries/main/msi/*.msi
            build/compose/binaries/main/exe/*.exe
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    # Publish even if one OS failed, as long as at least one build succeeded
    if: |
      always() &&
      startsWith(github.ref, 'refs/tags/v') &&
      (needs.build-windows.result == 'success' || needs.build-macos.result == 'success')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: false

      - name: List assets
        run: find release-assets -type f || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Stickyland ${{ github.ref_name }}
          body: |
            ## Stickyland ${{ github.ref_name }}

            ### Install
            - **Windows:** download the `.msi` (or `.exe`) and run it
            - **macOS:** download the `.dmg` → drag Stickyland to Applications

            On first launch a local SQLite database is created automatically.
            See [INSTALL.md](INSTALL.md) for details.
          generate_release_notes: true
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.msi
            release-assets/**/*.exe
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
